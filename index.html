<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогрессор</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Временная иконка, чтобы убрать 404 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🧠</text></svg>">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">🧠 Прогрессор</div>
            <div class="api-status" id="apiStatus">🔌 Подключение...</div>
        </header>

        <!-- СЮДА ГРУЗЯТСЯ СТРАНИЦЫ -->
        <main class="app-content" id="appContent"></main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="chat" onclick="App.navigate('chat')">
                <span class="nav-icon">💬</span>
                <span class="nav-label">Чат</span>
            </button>
            <button class="nav-btn" data-page="roadmap" onclick="App.navigate('roadmap')">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">Маршрут</span>
            </button>
            <button class="nav-btn" data-page="leaderboard" onclick="App.navigate('leaderboard')">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">Рейтинг</span>
            </button>
        </nav>
    </div>

    <!-- ПОРЯДОК ВАЖЕН! Сначала app.js, потом модули -->
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/roadmap.js"></script>
    <script src="js/leaderboard.js"></script>
</body>
</html>
